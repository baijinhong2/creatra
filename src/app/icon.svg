<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#FBBF24"/>
  <!--
    creatra octopus v3 — premium brand mark
    - Bulbous onion-dome head (mantle) with subtle separation
    - 8 tentacles total: 4 main below (with strong curls) + 4 small reaching up/sides
    - No eyes (abstract, premium, premium feel)
    - All organic S-curves
  -->

  <!-- Head: tall onion-dome mantle -->
  <path
    d="M 18 34
       C 18 18 24 10 32 10
       C 40 10 46 18 46 34
       C 46 38 44 40 40 40
       L 24 40
       C 20 40 18 38 18 34 Z"
    fill="#18181B"/>

  <!-- Subtle mantle highlight (a tiny gold slit on the head, suggests depth) -->
  <ellipse cx="32" cy="18" rx="3" ry="1.5" fill="#FBBF24" opacity="0.5"/>

  <!-- 4 main tentacles below — strong curls at tips -->
  <g stroke="#18181B" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M 22 40 Q 14 48 12 56 Q 10 60 14 60 Q 18 60 18 56"/>
    <path d="M 28 40 Q 24 50 22 58 Q 20 62 24 62"/>
    <path d="M 36 40 Q 40 50 42 58 Q 44 62 40 62"/>
    <path d="M 42 40 Q 50 48 52 56 Q 54 60 50 60 Q 46 60 46 56"/>
  </g>

  <!-- 4 side tentacles — small, reaching up and out -->
  <g stroke="#18181B" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 18 28 Q 10 22 4 14 Q 1 10 5 8"/>
    <path d="M 18 22 Q 12 16 8 8"/>
    <path d="M 46 28 Q 54 22 60 14 Q 63 10 59 8"/>
    <path d="M 46 22 Q 52 16 56 8"/>
  </g>
</svg>
